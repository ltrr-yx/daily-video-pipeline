project:
  name: "Motion Overrides Demo"
  language: "zh-CN"
  timezone: "Asia/Shanghai"
  output_dir: "outputs"

selection:
  max_items: 5
  freshness_hours: 168
  keywords: ["launch", "workflow", "data", "audio", "benchmark"]

story:
  template: "product_launch"
  seconds_per_scene: 5
  # Family-level overrides for product, proof, and conclusion scenes.
  # In this template, product applies to product_plate, proof applies to
  # verification_rail, and conclusion applies to cta_end.
  motion_overrides:
    product: "product_reveal"
    proof: "evidence_trace"
    conclusion: "verdict_lock"
  # Exact component keys are also supported when one scene needs a special rule:
  # motion_overrides:
  #   product_plate: "product_reveal"
  #   verification_rail: "evidence_trace"
  #   cta_end: "verdict_lock"

privacy:
  blocked_terms: []

video:
  width: 1080
  height: 1920
  fps: 30
  theme: "product_keynote"
  # Keep the global motion automatic; story.motion_overrides handles selected scenes.
  motion: "auto"
  seconds_per_scene: 5
  font_path: ""

narration:
  enabled: false
  engine: "auto"
  voice: "zh-CN-YunyangNeural"

music:
  path: ""
  volume: 0.18
  generate_demo_bgm_if_missing: true

sources:
  - name: "Example RSS feed"
    type: "rss"
    url: "https://example.com/feed.xml"
    enabled: false
    priority: 1.0
    tags: ["example"]
